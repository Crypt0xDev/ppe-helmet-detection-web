name: Keep Alive - PPE Detection API

on:
  schedule:
    - cron: '*/25 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 \
            https://crypt0xdev-ppe-helmet-detection-api.hf.space/)

          echo "HTTP Status: $STATUS"

          if [ "$STATUS" = "200" ]; then
            echo "✅ API activa y respondiendo"
          else
            echo "⚠️ API respondió con status $STATUS"
          fi
